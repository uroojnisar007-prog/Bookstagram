<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstagram | Discover Novels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .btn-transition { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#F5EBE0] overflow-hidden">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full px-10 py-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <img src="images/logo.png" alt="logo" class="w-7 h-7 object-contain">
            <span class="font-serif font-bold text-[#3D2C24] text-lg tracking-tight">Bookstagram</span>
        </div>
        <div class="hidden md:flex gap-10 items-center">
            <a href="index.html" class="text-[#3D2C24] font-medium text-sm hover:opacity-70 transition">Home</a>
            <a href="#" class="text-[#3D2C24]/70 font-medium text-sm hover:text-[#3D2C24] transition">Explore</a>
            <a href="login.html" class="text-[#3D2C24] font-bold text-sm border-b-2 border-[#3D2C24] pb-1 hover:opacity-70 transition">
                Sign In
            </a>
        </div>
    </nav>
    <!-- Hero Content -->
    <div class="flex flex-col items-center justify-center min-h-screen text-center px-6">
        
        <div class="mb-0">
            <img src="images/logo.png" alt="logo" class="w-96 h-96 object-contain">
        </div>
        <div class="-mt-12 mb-10">
            <h1 class="text-6xl md:text-6xl font-serif font-bold tracking-tight" style="color: #3D2C24;">
                Bookstagram
            </h1>
            <p class="max-w-md text-base mt-2 font-medium leading-relaxed opacity-70 mx-auto" style="color: #5D4037;">
                Every novel is a story, and every story is a new world. Start your reading journey today.
            </p>
        </div>
        
        <!-- Buttons Group (Connected to Login and Signup pages) -->
        <div class="flex flex-row gap-4">
            <a href="login.html" 
                class="btn-transition px-12 py-4 rounded-2xl font-bold text-[#F5EBE0] shadow-md hover:brightness-110 active:scale-95 flex items-center justify-center" 
                style="background-color: #3D2C24;">
                Login
            </a>
            
            <a href="signup.html" 
                class="btn-transition px-12 py-4 rounded-2xl font-bold border-2 shadow-sm hover:bg-white/30 active:scale-95 flex items-center justify-center" 
                style="border-color: #3D2C24; color: #3D2C24;">
                Signup
            </a>
        </div>
        <!-- Footer -->
        <div class="absolute bottom-8 w-full text-center">
            <p class="text-[10px] uppercase tracking-[0.4em] font-semibold opacity-30" style="color: #3D2C24;">
                SINCE 2026 • READING COMMUNITY
            </p>
        </div>
    </div>
</body>
</html>
