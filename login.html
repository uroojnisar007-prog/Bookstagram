<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstagram | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10" style="background-color: #F5EBE0;">

    <div class="flex flex-col md:flex-row w-full max-w-[900px] min-h-[600px] rounded-[3rem] overflow-hidden shadow-2xl relative" style="background-color: #3D2C24;">
        
        <!-- Back Button -->
        <a href="index.html" class="absolute top-8 left-8 text-[#D5BDAF] text-xs font-bold uppercase tracking-widest hover:underline z-10">
            ← Back to Home
        </a>

        <!-- Left Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
            <div class="text-left mb-8">
                <h2 class="text-4xl font-serif font-bold mb-3" style="color: #D5BDAF;">Welcome Back</h2>
                <p class="text-sm font-medium opacity-70" style="color: #F5EBE0;">Every novel is a new world.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] tracking-[0.2em] font-bold mb-2 ml-1 opacity-60" style="color: #D5BDAF;">USERNAME</label>
                    <!-- Added ID for JavaScript access -->
                    <input type="text" id="username" required 
                        class="w-full p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-[#D5BDAF]/30 text-white" 
                        style="background-color: #4E3B31;" 
                        placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-[10px] tracking-[0.2em] font-bold mb-2 ml-1 opacity-60" style="color: #D5BDAF;">PASSWORD</label>
                    <input type="password" required 
                        class="w-full p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-[#D5BDAF]/30 text-white" 
                        style="background-color: #4E3B31;" 
                        placeholder="••••••••">
                </div>
                <button type="submit" class="w-full p-4 mt-4 rounded-2xl font-bold uppercase tracking-widest transition-all hover:scale-[1.02] active:scale-95 shadow-xl" style="background-color: #D5BDAF; color: #3D2C24;">Sign In</button>
            </form>

            <p class="mt-8 text-xs opacity-60" style="color: #F5EBE0;">
                Don't have an account? 
                <a href="signup.html" class="font-bold underline ml-1" style="color: #D5BDAF;">Join Now</a>
            </p>
        </div>

        <!-- Right Side: Background Image -->
        <div class="hidden md:block w-1/2 relative bg-[#F5EBE0]">
            <div class="absolute inset-0 bg-cover bg-center opacity-80" 
                 style="background-image: url('images/backgroundimg.png');">
            </div>
            <div class="absolute inset-0 bg-[#3D2C24]/10"></div>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Username get karna
            const userValue = document.getElementById('username').value;
            
            // Browser memory mein save karna taake dashboard pe dikha sakein
            localStorage.setItem('loggedInUser', userValue);
            
            // Dashboard par redirect karna
            window.location.href = "dashboard.html";
        });
    </script>

</body>
</html>
