<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstagram | Join Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10" style="background-color: #F5EBE0;">

    <div class="flex flex-col md:flex-row w-full max-w-[900px] min-h-[600px] rounded-[3rem] overflow-hidden shadow-2xl relative" style="background-color: #3D2C24;">
        
        <!-- Back Button -->
        <a href="index.html" class="absolute top-8 left-8 text-[#D5BDAF] text-xs font-bold uppercase tracking-widest hover:underline z-10">
            ← Back to Home
        </a>

        <!-- Left Side: Signup Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
            <div class="text-left mb-6">
                <h2 class="text-4xl font-serif font-bold mb-2" style="color: #D5BDAF;">Create Account</h2>
                <p class="text-sm font-medium opacity-70" style="color: #F5EBE0;">Join our community of readers today.</p>
            </div>

            <form id="signupForm" class="space-y-4">
                <!-- Username Field -->
                <div>
                    <label class="block text-[10px] tracking-[0.2em] font-bold mb-1 ml-1 opacity-60" style="color: #D5BDAF;">USERNAME</label>
                    <input type="text" id="reg-username" required 
                        class="w-full p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-[#D5BDAF]/30 text-white" 
                        style="background-color: #4E3B31;" 
                        placeholder="Choose a username">
                </div>

                <!-- Email Field -->
                <div>
                    <label class="block text-[10px] tracking-[0.2em] font-bold mb-1 ml-1 opacity-60" style="color: #D5BDAF;">EMAIL ADDRESS</label>
                    <input type="email" required 
                        class="w-full p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-[#D5BDAF]/30 text-white" 
                        style="background-color: #4E3B31;" 
                        placeholder="your@email.com">
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-[10px] tracking-[0.2em] font-bold mb-1 ml-1 opacity-60" style="color: #D5BDAF;">PASSWORD</label>
                    <input type="password" required 
                        class="w-full p-4 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-[#D5BDAF]/30 text-white" 
                        style="background-color: #4E3B31;" 
                        placeholder="••••••••">
                </div>

                <button type="submit" class="w-full p-4 mt-2 rounded-2xl font-bold uppercase tracking-widest transition-all hover:scale-[1.02] active:scale-95 shadow-xl" style="background-color: #D5BDAF; color: #3D2C24;">Register</button>
            </form>

            <p class="mt-6 text-xs opacity-60" style="color: #F5EBE0;">
                Already have an account? <a href="login.html" class="font-bold underline ml-1" style="color: #D5BDAF;">Login here</a>
            </p>
        </div>

        <!-- Right Side: Background Image -->
        <div class="hidden md:block w-1/2 relative bg-[#F5EBE0]">
            <div class="absolute inset-0 bg-cover bg-center opacity-80" 
                 style="background-image: url('images/backgroundimg.png');">
            </div>
            <div class="absolute inset-0 bg-[#3D2C24]/10"></div>
        </div>

    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Username pick karna
            const newUser = document.getElementById('reg-username').value;
            
            // Temporary save karna (Firebase se pehle testing ke liye)
            localStorage.setItem('loggedInUser', newUser);
            
            alert("Account Created Successfully! Redirecting to Dashboard...");
            
            // Signup ke baad direct dashboard par bhejna professional lagta hai
            window.location.href = 'dashboard.html';
        });
    </script>

</body>
</html>
